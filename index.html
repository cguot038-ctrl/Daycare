<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>對茗日照聯絡簿系統</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --sage: #7a9e7e;
    --sage-light: #a8c5ac;
    --sage-dark: #4d7252;
    --cream: #faf7f2;
    --warm: #f0ebe0;
    --brown: #6b5344;
    --brown-light: #c4a882;
    --text: #2c2c2c;
    --text-muted: #888;
    --border: #e0d9ce;
    --white: #ffffff;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --admin-accent: #4d7252;
    --family-accent: #7a6b8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #4d7252 0%, #7a9e7e 50%, #a8c5ac 100%);
    position: relative;
    overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .login-card {
    background: var(--white);
    border-radius: 24px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: var(--shadow-lg);
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 12px;
  }
  .login-logo h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 700;
    color: var(--sage-dark);
    line-height: 1.5;
  }
  .login-logo p {
    font-size: 12px; color: var(--text-muted); margin-top: 4px;
  }
  .login-tabs {
    display: flex; gap: 0;
    background: var(--warm); border-radius: 12px;
    padding: 4px; margin-bottom: 24px;
  }
  .login-tab {
    flex: 1; padding: 10px; border: none; background: none;
    border-radius: 9px; font-size: 14px; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-muted); transition: all 0.2s;
    font-weight: 500;
  }
  .login-tab.active {
    background: var(--white); color: var(--sage-dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--brown); margin-bottom: 6px;
  }
  .form-group input {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream); color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus { border-color: var(--sage); background: var(--white); }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--sage-dark), var(--sage));
    color: var(--white); border: none; border-radius: 12px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }
  .login-error {
    background: #fef2f2; color: #dc2626;
    border: 1px solid #fecaca; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; margin-top: 12px;
    display: none;
  }

  /* ── APP SHELL ── */
  #app { display: none; min-height: 100vh; }

  /* TOP NAV */
  .topnav {
    height: 60px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .topnav-logo {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 700;
    color: var(--sage-dark);
    flex: 1;
    white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .topnav-logo span { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: 8px; }
  .topnav-user {
    display: flex; align-items: center; gap: 10px;
  }
  .user-badge {
    background: var(--warm); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; font-weight: 500;
    color: var(--brown);
  }
  .user-badge.admin { background: #e8f5e9; color: var(--sage-dark); }
  .user-badge.family { background: #f3e8ff; color: #6b21a8; }
  .btn-logout {
    background: none; border: 1.5px solid var(--border);
    border-radius: 8px; padding: 6px 14px;
    font-size: 13px; cursor: pointer; color: var(--text-muted);
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: #dc2626; color: #dc2626; }

  /* LAYOUT */
  .app-layout { display: flex; min-height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 16px 0;
  }
  .sidebar-section { margin-bottom: 8px; }
  .sidebar-section-title {
    padding: 6px 20px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted);
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-size: 14px; cursor: pointer; color: var(--text);
    transition: all 0.15s; border-radius: 0;
    border-left: 3px solid transparent;
    font-weight: 400;
  }
  .sidebar-item:hover { background: var(--warm); }
  .sidebar-item.active {
    background: #e8f5e9; color: var(--sage-dark);
    border-left-color: var(--sage-dark); font-weight: 600;
  }
  .sidebar-item .icon { font-size: 16px; width: 20px; text-align: center; }

  /* MAIN CONTENT */
  .main-content { flex: 1; padding: 24px; overflow-y: auto; }

  /* PAGE SECTIONS */
  .page { display: none; }
  .page.active { display: block; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .page-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; font-weight: 700; color: var(--sage-dark);
  }
  .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    border: none; transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-primary {
    background: var(--sage-dark); color: var(--white);
  }
  .btn-primary:hover { background: var(--sage); }
  .btn-secondary {
    background: var(--warm); color: var(--brown); border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger {
    background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
  }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  /* CARDS */
  .card {
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--border);
    padding: 20px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  /* MESSAGES / CONTACT BOOK */
  .msg-compose {
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--border); padding: 20px;
    margin-bottom: 20px;
  }
  .msg-compose h3 {
    font-size: 15px; font-weight: 600; margin-bottom: 14px;
    color: var(--sage-dark);
  }
  .msg-compose select, .msg-compose textarea, .msg-compose input[type=text] {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream); color: var(--text);
    outline: none; transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  .msg-compose select:focus,
  .msg-compose textarea:focus,
  .msg-compose input[type=text]:focus { border-color: var(--sage); background: var(--white); }
  .msg-compose textarea { resize: vertical; min-height: 100px; }
  .msg-compose-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .msg-compose-row select { margin-bottom: 0; }

  .msg-thread {
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .msg-item {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .msg-item:last-child { border-bottom: none; }
  .msg-item:hover { background: var(--warm); }
  .msg-item.unread { border-left: 3px solid var(--sage); }
  .msg-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .msg-sender { font-weight: 600; font-size: 14px; }
  .msg-time { font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .msg-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    font-weight: 600;
  }
  .tag-admin { background: #e8f5e9; color: var(--sage-dark); }
  .tag-care { background: #fff3e0; color: #e65100; }
  .tag-broadcast { background: #e3f2fd; color: #1565c0; }
  .tag-family { background: #f3e8ff; color: #6b21a8; }
  .msg-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* MESSAGE DETAIL MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 20px;
    width: 580px; max-width: 95vw; max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.3s ease;
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--sage-dark); }
  .modal-close {
    background: none; border: none; font-size: 20px;
    cursor: pointer; color: var(--text-muted);
    line-height: 1; padding: 4px;
  }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
  }
  .modal-footer textarea {
    flex: 1; padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    resize: none; min-height: 60px; outline: none;
    transition: border-color 0.2s;
  }
  .modal-footer textarea:focus { border-color: var(--sage); }

  .reply-bubble {
    background: var(--warm); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 12px;
  }
  .reply-bubble.admin-reply { background: #e8f5e9; }
  .reply-bubble .reply-meta {
    font-size: 12px; color: var(--text-muted); margin-bottom: 4px;
  }
  .reply-bubble .reply-text { font-size: 14px; }

  .original-msg {
    background: var(--cream); border-left: 3px solid var(--sage);
    border-radius: 0 12px 12px 0; padding: 14px 16px; margin-bottom: 16px;
  }
  .original-msg .original-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .original-msg .original-text { font-size: 15px; font-weight: 500; line-height: 1.6; }

  /* CATEGORIES & DOCUMENTS */
  .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .category-card {
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--border); padding: 20px;
    box-shadow: var(--shadow); cursor: pointer;
    transition: all 0.2s;
  }
  .category-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .category-icon { font-size: 28px; margin-bottom: 10px; }
  .category-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .category-count { font-size: 13px; color: var(--text-muted); }
  .category-actions { display: flex; gap: 8px; margin-top: 14px; }

  .doc-list { display: flex; flex-direction: column; gap: 12px; }
  .doc-item {
    background: var(--white); border-radius: 12px;
    border: 1px solid var(--border); padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    transition: box-shadow 0.2s;
  }
  .doc-item:hover { box-shadow: var(--shadow); }
  .doc-type-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .doc-type-pdf { background: #fef2f2; }
  .doc-type-word { background: #eff6ff; }
  .doc-type-img { background: #f0fdf4; }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .doc-actions { display: flex; gap: 8px; }

  /* ACCOUNTS */
  .accounts-table {
    width: 100%; border-collapse: collapse;
    background: var(--white); border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .accounts-table th {
    background: var(--warm); padding: 12px 16px;
    font-size: 13px; font-weight: 600; color: var(--brown);
    text-align: left;
  }
  .accounts-table td {
    padding: 12px 16px; font-size: 14px;
    border-top: 1px solid var(--border);
  }
  .accounts-table tr:hover td { background: var(--warm); }
  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 600;
  }
  .status-active { background: #e8f5e9; color: var(--sage-dark); }
  .status-inactive { background: #f5f5f5; color: var(--text-muted); }

  /* FORM MODAL */
  .form-modal-group { margin-bottom: 14px; }
  .form-modal-group label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--brown); margin-bottom: 6px;
  }
  .form-modal-group input,
  .form-modal-group select,
  .form-modal-group textarea {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream); color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .form-modal-group input:focus,
  .form-modal-group select:focus,
  .form-modal-group textarea:focus { border-color: var(--sage); background: var(--white); }
  .form-modal-group textarea { resize: vertical; min-height: 80px; }

  /* UPLOAD AREA */
  .upload-area {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.2s; color: var(--text-muted);
    background: var(--cream);
  }
  .upload-area:hover { border-color: var(--sage); color: var(--sage-dark); background: var(--warm); }
  .upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-area p { font-size: 14px; }
  .upload-area input { display: none; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--sage-dark); color: var(--white);
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; z-index: 999;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.3s ease;
    display: none;
  }
  .toast.show { display: block; }
  .toast.error { background: #dc2626; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* BACK BTN */
  .btn-back {
    background: none; border: none; cursor: pointer;
    color: var(--sage-dark); font-size: 14px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 0; font-family: 'Noto Sans TC', sans-serif;
    margin-bottom: 16px;
  }
  .btn-back:hover { text-decoration: underline; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--white); border-radius: 14px;
    border: 1px solid var(--border); padding: 16px 20px;
    box-shadow: var(--shadow);
  }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--sage-dark); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* FILE INPUT VISIBLE */
  .file-input-wrap { position: relative; }
  .file-input-wrap input[type=file] { display: none; }

  /* SPINNER */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* SEARCH BAR */
  .search-bar {
    display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
  }
  .search-bar input {
    flex: 1; padding: 10px 16px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 14px; font-family: 'Noto Sans TC', sans-serif;
    background: var(--white); color: var(--text); outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--sage); }
  .search-bar select {
    padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--white); color: var(--text); outline: none;
  }
  .search-highlight {
    background: #fff59d; border-radius: 2px; padding: 0 1px;
  }


  /* ── EMERGENCY ALERTS ── */
  .emergency-banner {
    position: fixed; top: 60px; left: 0; right: 0; z-index: 150;
    background: linear-gradient(135deg, #b71c1c, #e53935);
    color: white; padding: 0;
    box-shadow: 0 4px 20px rgba(183,28,28,0.5);
    animation: alertSlide 0.4s ease;
    display: none;
  }
  .emergency-banner.show { display: block; }
  @keyframes alertSlide {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .emergency-banner-inner {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; cursor: pointer;
    animation: pulse-bg 1.5s ease-in-out infinite;
  }
  @keyframes pulse-bg {
    0%, 100% { background: transparent; }
    50% { background: rgba(255,255,255,0.08); }
  }
  .emergency-icon { font-size: 24px; flex-shrink: 0; animation: shake 0.5s infinite; }
  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }
  .emergency-text { flex: 1; }
  .emergency-text strong { font-size: 15px; display: block; }
  .emergency-text span { font-size: 13px; opacity: 0.9; }
  .emergency-close {
    background: rgba(255,255,255,0.2); border: none; color: white;
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
    font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
    flex-shrink: 0;
  }

  .alert-card {
    border-radius: 16px; padding: 18px 20px; margin-bottom: 14px;
    border-left: 5px solid #e53935;
    background: #fff5f5; box-shadow: 0 2px 12px rgba(229,57,53,0.15);
  }
  .alert-card.level-life { border-left-color: #b71c1c; background: #fff5f5; }
  .alert-card.level-behavior { border-left-color: #e65100; background: #fff8f3; }

async function doLogin() {

      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Accept': 'application/json',
        'Content-Type': 'application/json'

// ═══════════════════════════════════════════════════
//  EMERGENCY ALERTS
// ═══════════════════════════════════════════════════
const ALERT_LEVELS = {
  life:     { label: '🚨 生命安全', badge: 'badge-life',     cls: 'level-life',     icon: '🚨' },
  medical:  { label: '🏥 緊急就醫', badge: 'badge-medical',  cls: 'level-medical',  icon: '🏥' },
  behavior: { label: '⚠️ 困擾行為', badge: 'badge-behavior', cls: 'level-behavior', icon: '⚠️' },
  contact:  { label: '📞 請立即聯繫', badge: 'badge-contact', cls: 'level-contact',  icon: '📞' },
  resolved: { label: '✅ 已解除',   badge: 'badge-resolved', cls: 'level-resolved', icon: '✅' },
};

let alertPollingTimer = null;

function startAlertPolling() {
  checkNewAlerts();
  alertPollingTimer = setInterval(checkNewAlerts, 30000); // 每30秒檢查
}

async function checkNewAlerts() {
  if (!currentUser) return;
  const since = new Date(Date.now() - 86400000).toISOString(); // 過去24小時
  let query;
  if (currentUser.role === 'admin') {
    query = `emergency_alerts?status=neq.resolved&created_at=gte.${since}&order=created_at.desc&limit=5`;
  } else {
    query = `emergency_alerts?or=(family_id.eq.${currentUser.id},family_id.is.null)&status=neq.resolved&created_at=gte.${since}&order=created_at.desc&limit=3`;
  }
  const res = await api(query);
  const alerts = await res.json();
  if (!Array.isArray(alerts) || alerts.length === 0) {
    hideBanner(); return;
  }
  const latest = alerts[0];
  const lvl = ALERT_LEVELS[latest.level] || ALERT_LEVELS.life;
  showBanner(`${lvl.icon} ${latest.patient_name} - ${lvl.label}`, latest.description || '');

  // 顯示側欄紅點
  const badge = document.getElementById(currentUser.role === 'admin' ? 'alert-badge' : 'family-alert-badge');
  if (badge) badge.style.display = 'inline';
}

function showBanner(title, sub) {
  const b = document.getElementById('emergency-banner');
  const t = document.getElementById('emergency-banner-title');
  const s = document.getElementById('emergency-banner-sub');
  if (b && t && s) { t.textContent = title; s.textContent = sub; b.classList.add('show'); }
}
function hideBanner() {
  const b = document.getElementById('emergency-banner');
  if (b) b.classList.remove('show');
}
function dismissBanner() {
  navigateToAlerts();
}
function navigateToAlerts() {
  hideBanner();
  navigateTo(currentUser.role === 'admin' ? 'alerts' : 'family-alerts');
}

async function renderAlerts() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = `<div class="page active">
    <div class="page-header">
      <div>
        <div class="page-title" style="color:#b71c1c">🚨 緊急事件管理</div>
        <div class="page-subtitle">發送及追蹤緊急事件通知</div>
      </div>
      <button class="btn" style="background:linear-gradient(135deg,#b71c1c,#e53935);color:white"
        onclick="openSendAlertModal()">🚨 發送緊急通知</button>
    </div>

    <!-- 篩選 -->
    <div class="search-bar" style="margin-bottom:16px">
      <select id="alert-filter" onchange="loadAlerts()" style="flex:1">
        <option value="active">進行中事件</option>
        <option value="all">全部事件紀錄</option>
        <option value="resolved">已解除事件</option>
      </select>
    </div>

    <div id="alert-list">
      <div class="empty-state"><div class="empty-icon">🔔</div><p>載入中...</p></div>
    </div>
  </div>`;

  // 清除紅點
  const badge = document.getElementById('alert-badge');
  if (badge) badge.style.display = 'none';

  loadAlerts();
}

async function loadAlerts() {
  const el = document.getElementById('alert-list');
  if (!el) return;
  const filter = document.getElementById('alert-filter')?.value || 'active';
  let query = 'emergency_alerts?order=created_at.desc&limit=100';
  if (filter === 'active') query += '&status=neq.resolved';
  if (filter === 'resolved') query += '&status=eq.resolved';

  const res = await api(query);
  const list = await res.json();

  if (!Array.isArray(list) || list.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>目前無緊急事件</p></div>';
    return;
  }

  el.innerHTML = list.map(a => {
    const lvl = ALERT_LEVELS[a.level] || ALERT_LEVELS.life;
    const isResolved = a.status === 'resolved';
    return `
    <div class="alert-card ${lvl.cls}${isResolved?' level-resolved':''}">
      <div class="alert-header">
        <span class="alert-level-badge ${isResolved?'badge-resolved':lvl.badge}">${isResolved?'✅ 已解除':lvl.label}</span>
        <span class="alert-patient">👤 ${escHtml(a.patient_name)}</span>
        <span class="alert-time">${formatTimeFull(a.created_at)}</span>
      </div>
      <div class="alert-content">${escHtml(a.description||'')}</div>
      <div class="alert-confirm-list" id="confirms-${a.id}">載入確認中...</div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        ${!isResolved ? `<button class="btn btn-sm" style="background:#2e7d32;color:white" onclick="resolveAlert(${a.id})">✅ 標記已解除</button>` : ''}
        <button class="btn btn-secondary btn-sm" onclick="deleteAlert(${a.id})">🗑️ 刪除</button>
        <span style="font-size:12px;color:var(--text-muted);align-self:center">發送者：${escHtml(a.sent_by)}</span>
      </div>
    </div>`;
  }).join('');

  // 載入每個事件的確認名單
  list.forEach(a => loadAlertConfirms(a.id));
}

async function loadAlertConfirms(alertId) {
  const el = document.getElementById(`confirms-${alertId}`);
  if (!el) return;
  const res = await api(`alert_confirms?alert_id=eq.${alertId}&order=created_at.asc`);
  const list = await res.json();
  if (!Array.isArray(list) || list.length === 0) {
    el.textContent = '尚無家屬確認收到'; return;
  }
  el.innerHTML = `<span style="color:#2e7d32;font-weight:600">✅ 已確認收到（${list.length}人）：</span> ` +
    list.map(c => escHtml(c.family_name)).join('、');
}

async function loadFamilyAlerts() {
  const el = document.getElementById('family-alert-list');
  if (!el) return;
  const res = await api(`emergency_alerts?or=(family_id.eq.${currentUser.id},family_id.is.null)&order=created_at.desc&limit=50`);
  const list = await res.json();

  if (!Array.isArray(list) || list.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>目前無緊急通知</p></div>';
    return;
  }

  // 取得此家屬的確認紀錄
  const confRes = await api(`alert_confirms?family_id=eq.${currentUser.id}`);
  const myConfs = await confRes.json();
  const confirmedIds = new Set(Array.isArray(myConfs) ? myConfs.map(c => c.alert_id) : []);

  el.innerHTML = list.map(a => {
    const lvl = ALERT_LEVELS[a.level] || ALERT_LEVELS.life;
    const isResolved = a.status === 'resolved';
    const iConfirmed = confirmedIds.has(a.id);
    return `
    <div class="alert-card ${isResolved ? 'level-resolved' : lvl.cls}">
      <div class="alert-header">
        <span class="alert-level-badge ${isResolved?'badge-resolved':lvl.badge}">${isResolved?'✅ 已解除':lvl.label}</span>
        <span class="alert-patient">👤 ${escHtml(a.patient_name)}</span>
        <span class="alert-time">${formatTimeFull(a.created_at)}</span>
      </div>
      <div class="alert-content">${escHtml(a.description||'')}</div>
      ${iConfirmed
        ? `<div class="alert-confirmed">✅ 您已確認收到</div>`
        : !isResolved ? `<button class="btn btn-sm" style="background:#1565c0;color:white;margin-top:8px"
            onclick="confirmAlertReceived(${a.id})">📩 確認已收到通知</button>` : ''}
    </div>`;
  }).join('');
}

async function confirmAlertReceived(alertId) {

let allMessages = [];

async function loadMessageList() {
  const el = document.getElementById('msg-thread');
  if (!el) return;
  const res = await api('messages?order=created_at.desc&limit=200');
  const list = await res.json();
  allMessages = Array.isArray(list) ? list : [];
  renderMessageList(allMessages, '');
}

function renderMessageList(list, keyword) {
  const el = document.getElementById('msg-thread');
  if (!el) return;
  if (!list || list.length === 0) {
    el.innerHTML = keyword
      ? '<div class="empty-state"><div class="empty-icon">🔍</div><p>找不到符合的訊息</p></div>'
      : '<div class="empty-state"><div class="empty-icon">📭</div><p>尚無訊息記錄</p></div>';
    return;
  }
  el.innerHTML = list.map(m => {
    const preview = keyword
      ? highlightKeyword(escHtml(m.content), keyword)
      : escHtml(m.content);
    return `
    <div class="msg-item" onclick="openMessage(${m.id})">
      <div class="msg-meta">
        <span class="msg-sender">${escHtml(m.sender_name)}</span>
        <span class="msg-tag tag-${m.category_type||'admin'}">${escHtml(m.category_label||'一般')}</span>
        ${m.recipient_id ? '' : '<span class="msg-tag tag-broadcast">廣播</span>'}
        ${m.payment_img_url ? '<span class="msg-tag" style="background:#fff3e0;color:#e65100">💰 繳費</span>' : ''}
        <span class="msg-time">${formatTime(m.created_at)}</span>
      </div>
      <div class="msg-preview">${preview}</div>
    </div>`;
  }).join('');
}

function highlightKeyword(text, keyword) {
  if (!keyword) return text;
  const re = new RegExp(escHtml(keyword).replace(/[.*+?^${}()|[\]\]/g, '\$&'), 'gi');
  return text.replace(re, m => `<span class="search-highlight">${m}</span>`);
}

function searchMessages() {
  const keyword = (document.getElementById('msg-search')?.value || '').trim().toLowerCase();
  const roleFilter = document.getElementById('msg-filter-role')?.value || 'all';
  const typeFilter = document.getElementById('msg-filter-type')?.value || 'all';

  let filtered = allMessages;
  if (roleFilter !== 'all') filtered = filtered.filter(m => m.sender_role === roleFilter);
  if (typeFilter !== 'all') filtered = filtered.filter(m => m.category_type === typeFilter);
  if (keyword) filtered = filtered.filter(m =>
    (m.content||'').toLowerCase().includes(keyword) ||
    (m.sender_name||'').toLowerCase().includes(keyword) ||
    (m.category_label||'').toLowerCase().includes(keyword)
  );
  renderMessageList(filtered, keyword);
}

async function sendMessage() {
  const recipient = document.getElementById('msg-recipient').value;
  const catType = document.getElementById('msg-category-type').value;
  const catLabel = document.getElementById('msg-category-label').value;
  const content = document.getElementById('msg-content').value.trim();
  if (!content) { showToast('請填寫訊息內容', true); return; }

  // 處理繳費圖片（只有廣播才有）
  let paymentImgUrl = null;
  const imgInput = document.getElementById('payment-img-input');
  if (recipient === 'all' && imgInput && imgInput.files[0]) {
    const file = imgInput.files[0];
    const safeFileName = file.name.replace(/[^\w.\-]/g, '_');
    const filePath = `payment/${Date.now()}_${safeFileName}`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/docs/${filePath}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'x-upsert': 'true' },
      body: file
    });
    if (uploadRes.ok) {
      paymentImgUrl = `${SUPABASE_URL}/storage/v1/object/public/docs/${filePath}`;
    } else {
      showToast('繳費圖片上傳失敗，訊息仍將發送', false);
    }
  }

  const payload = {
    sender_name: currentUser.display_name || currentUser.username,
    sender_role: 'admin',
    recipient_id: recipient === 'all' ? null : parseInt(recipient),
    category_type: catType,
    category_label: catLabel,
    content,
    payment_img_url: paymentImgUrl,
    created_at: new Date().toISOString()
  };

  const res = await api('messages', { method: 'POST', body: JSON.stringify(payload) });

  if (res.ok) {
    showToast('訊息已發送');
    document.getElementById('msg-content').value = '';
    if (imgInput) { imgInput.value = ''; }
    const lbl = document.getElementById('payment-img-label');
    if (lbl) lbl.textContent = '';
    loadMessageList();
  } else {
    showToast('發送失敗，請稍後再試', true);
  }
}

async function openMessage(msgId) {
  currentMsgId = msgId;
  const res = await api(`messages?id=eq.${msgId}`);
  const msgs = await res.json();
  if (!msgs || msgs.length === 0) return;
  const msg = msgs[0];

  const replRes = await api(`message_replies?message_id=eq.${msgId}&order=created_at.asc`);
  const replies = await replRes.json();

  document.getElementById('msg-modal-title').textContent = '聯絡簿訊息';
  document.getElementById('msg-modal-meta').textContent =
    `${msg.sender_name} · ${formatTime(msg.created_at)} · ${msg.category_label||'一般'}`;

  // 已繳費名單（主管端才顯示）
  const paidReplies = Array.isArray(replies) ? replies.filter(r => r.is_payment_confirm) : [];
  const paidSection = currentUser.role === 'admin' && msg.payment_img_url && paidReplies.length > 0
    ? `<div style="background:#e8f5e9;border-radius:10px;padding:12px 14px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:var(--sage-dark);margin-bottom:6px">✅ 已確認繳費（${paidReplies.length} 人）</div>
        ${paidReplies.map(r => `<div style="font-size:13px;color:var(--text)">• ${escHtml(r.sender_name)} · ${formatTime(r.created_at)}</div>`).join('')}
      </div>` : '';

  // 家屬是否已確認繳費
  const myPaid = currentUser.role === 'family' && Array.isArray(replies) &&
    replies.some(r => r.is_payment_confirm && r.sender_name === (currentUser.display_name || currentUser.username));

  const body = document.getElementById('msg-modal-body');
  body.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn btn-secondary btn-sm" onclick="exportSingleWord(${msgId})">📄 匯出 Word</button>
    </div>
    <div class="original-msg">
      <div class="original-meta">${escHtml(msg.sender_name)} 於 ${formatTime(msg.created_at)} 發送</div>
      <div class="original-text">${escHtml(msg.content)}</div>
      ${msg.payment_img_url ? `
        <div style="margin-top:12px">
          <div style="font-size:12px;font-weight:700;color:#e65100;margin-bottom:6px">💰 繳費資訊</div>
          <img src="${msg.payment_img_url}" style="max-width:100%;border-radius:8px;border:1px solid var(--border)" alt="繳費圖片">
        </div>` : ''}
    </div>
    ${paidSection}
    ${Array.isArray(replies) && replies.filter(r=>!r.is_payment_confirm).length > 0
      ? replies.filter(r=>!r.is_payment_confirm).map(r => `
        <div class="reply-bubble ${r.sender_role === 'admin' ? 'admin-reply' : ''}">
          <div class="reply-meta">${escHtml(r.sender_name)} · ${formatTime(r.created_at)}</div>
          <div class="reply-text">${escHtml(r.content)}</div>
        </div>
      `).join('')
      : '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:8px">尚無回覆</div>'}
    ${msg.payment_img_url && currentUser.role === 'family' && !myPaid ? `
      <div style="text-align:center;margin-top:12px">
        <button class="btn btn-primary" onclick="confirmPayment(${msgId})" style="background:linear-gradient(135deg,#2e7d32,#43a047)">
          ✅ 確認已繳費
        </button>
      </div>` : ''}
    ${msg.payment_img_url && currentUser.role === 'family' && myPaid ? `
      <div style="text-align:center;margin-top:12px;color:var(--sage-dark);font-size:14px;font-weight:600">
        ✅ 您已確認繳費
      </div>` : ''}
  `;

  const footer = document.getElementById('msg-modal-footer');
  footer.style.display = 'flex';
  document.getElementById('reply-text').value = '';

  document.getElementById('msg-modal').classList.add('open');
}

async function confirmPayment(msgId) {
  const payload = {
    message_id: msgId,
    sender_name: currentUser.display_name || currentUser.username,
    sender_role: 'family',
    content: '已確認繳費',
    is_payment_confirm: true,
    created_at: new Date().toISOString()
  };
  const res = await api('message_replies', { method: 'POST', body: JSON.stringify(payload) });
  if (res.ok) { showToast('已回報繳費確認'); openMessage(msgId); }

async function loadDocuments(catId) {
  const el = document.getElementById('doc-list');
  if (!el) return;
  const id = catId || currentCategoryId;
  const res = await api(`documents?category_id=eq.${id}&order=created_at.desc`);
  const list = await res.json();

  if (!Array.isArray(list) || list.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><p>此類別尚無文件</p></div>';
    return;
  }

  el.innerHTML = list.map(d => {
    const ext = (d.file_name || '').split('.').pop().toLowerCase();
    const typeIcon = ext === 'pdf' ? '📕' : ext === 'doc' || ext === 'docx' ? '📘' : '🖼️';
    const typeCls = ext === 'pdf' ? 'doc-type-pdf' : ext === 'doc' || ext === 'docx' ? 'doc-type-word' : 'doc-type-img';
    return `
      <div class="doc-item">
        <div class="doc-type-icon ${typeCls}">${typeIcon}</div>
        <div class="doc-info">
          <div class="doc-name">${escHtml(d.file_name)}</div>
          <div class="doc-meta">${formatTime(d.created_at)} · 上傳者：${escHtml(d.uploaded_by)}</div>
          ${d.description ? `<div class="doc-meta">${escHtml(d.description)}</div>` : ''}
        </div>
        <div class="doc-actions">
          <a class="btn btn-secondary btn-sm" href="${d.file_url}" target="_blank">🔗 開啟</a>
          <button class="btn btn-danger btn-sm" onclick="deleteDocument(${d.id})">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

function openUploadModal() {
  openFormModal(
    '上傳文件',
    `<div class="form-modal-group">
      <label>文件說明（選填）</label>
      <input type="text" id="fm-doc-desc" placeholder="簡短說明此文件用途">
    </div>
    <div class="form-modal-group">
      <label>選擇文件</label>
      <div class="upload-area" onclick="document.getElementById('fm-file-input').click()">
        <div class="upload-icon">☁️</div>
        <p>點擊上傳 PDF、Word 或圖片</p>
        <p style="font-size:12px;margin-top:4px;color:var(--text-muted)">支援 .pdf .doc .docx .jpg .png .gif</p>
        <input type="file" id="fm-file-input" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.gif"
          onchange="updateUploadLabel(this)">
      </div>
      <div id="fm-file-label" style="font-size:13px;color:var(--sage-dark);margin-top:8px"></div>
    </div>`,
    async () => {
      const file = document.getElementById('fm-file-input').files[0];
      const desc = document.getElementById('fm-doc-desc').value.trim();
      if (!file) { showToast('請選擇文件', true); return false; }

      // Upload to Supabase Storage
      const safeFileName = file.name.replace(/[^\w.\-]/g, '_');
      const filePath = `documents/${Date.now()}_${safeFileName}`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/docs/${filePath}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'x-upsert': 'true'
        },
        body: file
      });

      if (!uploadRes.ok) {
        const errText = await uploadRes.text();
        let errMsg = '上傳失敗';
        try { errMsg = JSON.parse(errText).error || errMsg; } catch(e) {}
        showToast('文件上傳失敗：' + errMsg, true);
        return false;
      }

      const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/docs/${filePath}`;
      const payload = {
        category_id: currentCategoryId,
        file_name: file.name,
        file_url: fileUrl,
        file_size: file.size,
        description: desc || null,
        uploaded_by: currentUser.display_name || currentUser.username,
        created_at: new Date().toISOString()
      };

      const res = await api('documents', { method: 'POST', body: JSON.stringify(payload) });
      if (res.ok) { showToast('文件已上傳'); loadDocuments(currentCategoryId); return true; }
      showToast('儲存失敗', true); return false;
    }
  );
}

function updateUploadLabel(input) {
  const label = document.getElementById('fm-file-label');
  if (label && input.files[0]) label.textContent = `✅ 已選擇：${input.files[0].name}`;
}

  if (!confirm('確定要刪除此文件？')) return;
  await api(`documents?id=eq.${id}`, { method: 'DELETE' });

  loadDocuments(currentCategoryId);
}

  if (!list || list.length === 0) {
    el.innerHTML = keyword
      ? '<div class="empty-state"><div class="empty-icon">🔍</div><p>找不到符合的訊息</p></div>'
      : '<div class="empty-state"><div class="empty-icon">📭</div><p>尚無訊息</p></div>';
    return;
  }
  el.innerHTML = list.map(m => {
    const preview = keyword
      ? highlightKeyword(escHtml(m.content), keyword)
      : escHtml(m.content);
    return `
    <div class="msg-item" onclick="openMessage(${m.id})">
      <div class="msg-meta">
        <span class="msg-sender">${escHtml(m.sender_name)}</span>
        <span class="msg-tag tag-${m.category_type||'admin'}">${escHtml(m.category_label||'一般')}</span>
        ${!m.recipient_id ? '<span class="msg-tag tag-broadcast">廣播</span>' : ''}
        ${m.payment_img_url ? '<span class="msg-tag" style="background:#fff3e0;color:#e65100">💰 繳費</span>' : ''}
        <span class="msg-time">${formatTime(m.created_at)}</span>
      </div>
      <div class="msg-preview">${preview}</div>
    </div>`;
  }).join('');
}

function searchFamilyMessages() {
  const keyword = (document.getElementById('family-msg-search')?.value || '').trim().toLowerCase();
  const filtered = keyword
    ? allFamilyMessages.filter(m =>
        (m.content||'').toLowerCase().includes(keyword) ||
        (m.sender_name||'').toLowerCase().includes(keyword))
    : allFamilyMessages;
  renderFamilyMessageList(filtered, keyword);
}

function openFamilyCompose() {
  openFormModal('留言給日照中心', `
    <div class="form-modal-group">
      <label>訊息內容 *</label>
      <textarea id="fm-fmsg-content" placeholder="請輸入您想告知中心的事項..." style="min-height:120px"></textarea>
    </div>
  `, async () => {
    const content = document.getElementById('fm-fmsg-content').value.trim();
    if (!content) { showToast('請填寫訊息內容', true); return false; }

    const payload = {
      sender_name: currentUser.display_name || currentUser.username,
      sender_role: 'family',
      sender_family_id: currentUser.id,
      recipient_id: null,
      category_type: 'family',
      category_label: '家屬留言',
      content,
      created_at: new Date().toISOString()
    };
    const res = await api('messages', { method: 'POST', body: JSON.stringify(payload) });
    if (res.ok) { showToast('留言已送出'); loadFamilyMessages(); return true; }
    showToast('送出失敗', true); return false;
  });
}

async function renderFamilyDocs() {
  const mc = document.getElementById('main-content');

    <div class="page-header">
      <div>
        <div class="page-title">📄 文件查閱</div>
        <div class="page-subtitle">日照中心提供的相關文件</div>
      </div>
    </div>
    <div id="family-cat-list">
      <div class="empty-state"><div class="empty-icon">📂</div><p>載入中...</p></div>
    </div>
  </div>`;

  const res = await api('categories?order=type.asc,sort_order.asc');
  const cats = await res.json();
  const el = document.getElementById('family-cat-list');
  if (!el) return;

  if (!Array.isArray(cats) || cats.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><p>目前尚無文件類別</p></div>';
    return;

  el.innerHTML = `<div class="category-grid">${cats.map(c => `
    <div class="category-card" onclick="familyOpenCategoryDocs(${c.id},'${escHtml(c.name)}')">
      <div class="category-icon">${c.icon || (c.type === 'admin' ? '📁' : '🩺')}</div>
      <div class="category-name">${escHtml(c.name)}</div>
      <div class="category-count">${c.type === 'admin' ? '行政類別' : '個案照顧'}</div>
    </div>
  `).join('')}</div>`;

async function familyOpenCategoryDocs(catId, catName) {
  const mc = document.getElementById('main-content');
  mc.innerHTML = `<div class="page active">
    <button class="btn-back" onclick="renderFamilyDocs()">← 返回文件列表</button>
    <div class="page-header">
      <div class="page-title">${escHtml(catName)}</div>
    </div>
    <div class="doc-list" id="family-doc-list">
      <div class="empty-state"><div class="empty-icon">📄</div><p>載入中...</p></div>
    </div>
  </div>`;

  const res = await api(`documents?category_id=eq.${catId}&order=created_at.desc`);
  const list = await res.json();
  const el = document.getElementById('family-doc-list');

  if (!Array.isArray(list) || list.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><p>此類別尚無文件</p></div>';
    return;
  }

  el.innerHTML = list.map(d => {
    const ext = (d.file_name || '').split('.').pop().toLowerCase();
    const typeIcon = ext === 'pdf' ? '📕' : ext === 'doc' || ext === 'docx' ? '📘' : '🖼️';
    const typeCls = ext === 'pdf' ? 'doc-type-pdf' : ext === 'doc' || ext === 'docx' ? 'doc-type-word' : 'doc-type-img';
    return `
      <div class="doc-item">
        <div class="doc-type-icon ${typeCls}">${typeIcon}</div>
        <div class="doc-info">
          <div class="doc-name">${escHtml(d.file_name)}</div>
          <div class="doc-meta">${formatTime(d.created_at)}</div>
          ${d.description ? `<div class="doc-meta">${escHtml(d.description)}</div>` : ''}
        </div>
        <a class="btn btn-secondary btn-sm" href="${d.file_url}" target="_blank">🔗 開啟文件</a>
      </div>
    `;
  }).join('');
}

let formModalCallback = null;

function openFormModal(title, html, onConfirm) {
  document.getElementById('form-modal-title').textContent = title;
  document.getElementById('form-modal-body').innerHTML = html;
  formModalCallback = onConfirm;
  document.getElementById('form-modal-submit').onclick = async () => {
    const result = await formModalCallback();
    if (result) closeModal('form-modal');
  };
  document.getElementById('form-modal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ═══════════════════════════════════════════════════
//  WORD 匯出
// ═══════════════════════════════════════════════════
function escapeXml(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

function buildDocxXml(title, rows) {
  const paras = rows.map(r => {
    const bold = r.bold ? '<w:b/>' : '';
    const color = r.color ? `<w:color w:val="${r.color}"/>` : '';
    return `<w:p><w:pPr><w:spacing w:after="120"/></w:pPr><w:r><w:rPr>${bold}${color}</w:rPr><w:t xml:space="preserve">${escapeXml(r.text||'')}</w:t></w:r></w:p>`;
  }).join('');
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="32"/><w:color w:val="4d7252"/></w:rPr><w:t>${escapeXml('芯之初對茗日照中心 - 聯絡簿紀錄')}</w:t></w:r></w:p><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="24"/></w:rPr><w:t>${escapeXml(title)}</w:t></w:r></w:p><w:p><w:r><w:t></w:t></w:r></w:p>${paras}<w:sectPr/></w:body></w:document>`;
}

async function ensureJSZip() {
  if (typeof JSZip !== 'undefined') return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function buildDocxBlob(xmlContent) {
  await ensureJSZip();
  const zip = new JSZip();
  zip.file('[Content_Types].xml', '<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>');
  zip.file('_rels/.rels', '<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>');
  zip.file('word/document.xml', xmlContent);
  zip.file('word/_rels/document.xml.rels', '<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>');
  return await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function formatTimeFull(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

async function exportSingleWord(msgId) {
  showToast('Word 產生中...');
  try {
    const res = await api(`messages?id=eq.${msgId}`);
    const msgs = await res.json();
    if (!msgs || msgs.length === 0) return;
    const msg = msgs[0];
    const replRes = await api(`message_replies?message_id=eq.${msgId}&order=created_at.asc`);
    const replies = await replRes.json();
    const rows = [];
    rows.push({ text: `傳送者：${msg.sender_name}　時間：${formatTimeFull(msg.created_at)}　類別：${msg.category_label||'一般'}`, color: '888888' });
    rows.push({ text: '----------------------------------------' , color: 'cccccc' });
    rows.push({ text: msg.content });
    rows.push({ text: '' });
    if (Array.isArray(replies) && replies.length > 0) {
      rows.push({ text: '── 回覆紀錄 ──', bold: true, color: '4d7252' });
      replies.forEach(r => {
        rows.push({ text: `${r.sender_name}（${r.sender_role==='admin'?'主管':'家屬'}）· ${formatTimeFull(r.created_at)}`, color: '888888' });
        rows.push({ text: r.is_payment_confirm ? '✅ 已確認繳費' : r.content });
        rows.push({ text: '' });
      });
    }
    const xml = buildDocxXml(`對話紀錄 - ${formatTimeFull(msg.created_at)}`, rows);
    const blob = await buildDocxBlob(xml);
    downloadBlob(blob, `聯絡簿_${msg.sender_name}_${formatDate(msg.created_at)}.docx`);
    showToast('✅ Word 已下載');
  } catch(e) {
    console.error(e);
    showToast('匯出失敗：' + e.message, true);
  }
}

async function openExportAllModal() {
  const res = await api('family_accounts?select=id,display_name,patient_name&is_active=eq.true&order=patient_name.asc');
  const families = await res.json();
  openFormModal('匯出 Word 紀錄', `
    <div class="form-modal-group">
      <label>選擇匯出對象</label>
      <select id="fm-export-target">
        <option value="all">全部訊息（所有對話）</option>
        ${Array.isArray(families) ? families.map(f => `<option value="${f.id}">👨‍👩‍👧 ${f.display_name||''}（個案：${f.patient_name||''}）</option>`).join('') : ''}
      </select>
    </div>
    <div class="form-modal-group">
      <label>時間範圍（選填）</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="date" id="fm-export-from" style="flex:1">
        <span style="color:var(--text-muted)">至</span>
        <input type="date" id="fm-export-to" style="flex:1">
      </div>
    </div>
  `, async () => { await exportAllWord(); return true; });
}

async function exportAllWord() {
  showToast('產生中，請稍候...');
  const target = document.getElementById('fm-export-target')?.value;
  const fromDate = document.getElementById('fm-export-from')?.value;
  const toDate = document.getElementById('fm-export-to')?.value;
  let query = 'messages?order=created_at.asc&limit=500';
  if (target && target !== 'all') query += `&or=(recipient_id.eq.${target},sender_family_id.eq.${target},recipient_id.is.null)`;
  if (fromDate) query += `&created_at=gte.${fromDate}T00:00:00`;
  if (toDate) query += `&created_at=lte.${toDate}T23:59:59`;
  const res = await api(query);
  const msgs = await res.json();
  if (!Array.isArray(msgs) || msgs.length === 0) { showToast('此範圍內沒有訊息', true); return; }
  const rows = [];
  for (const msg of msgs) {
    rows.push({ text: `【${msg.category_label||'一般'}】${msg.sender_role==='admin'?'日照中心':'家屬'} ${msg.sender_name}`, bold: true, color: msg.sender_role==='admin'?'4d7252':'6b21a8' });
    rows.push({ text: formatTimeFull(msg.created_at), color: '888888' });
    rows.push({ text: msg.content });
    if (msg.payment_img_url) rows.push({ text: '💰 此訊息附有繳費圖片', color: 'e65100' });
    const rRes = await api(`message_replies?message_id=eq.${msg.id}&order=created_at.asc`);
    const replies = await rRes.json();
    if (Array.isArray(replies) && replies.length > 0) {
      replies.forEach(r => {
        rows.push({ text: `  ↳ ${r.sender_name}（${r.sender_role==='admin'?'主管':'家屬'}）· ${formatTimeFull(r.created_at)}`, color: '888888' });
        rows.push({ text: `     ${r.is_payment_confirm ? '✅ 已確認繳費' : r.content}` });
      });
    }
    rows.push({ text: '----------------------------------------', color: 'dddddd' });
    rows.push({ text: '' });
  }
  try {
    const title = target === 'all' ? '全部聯絡簿紀錄' : '家屬聯絡簿紀錄';
    const xml = buildDocxXml(title, rows);
    const blob = await buildDocxBlob(xml);
    const dateStr = fromDate || formatDate(new Date().toISOString());
    downloadBlob(blob, `聯絡簿匯出_${dateStr}.docx`);
    showToast('✅ Word 已下載');
  } catch(e) {
    console.error(e);
    showToast('匯出失敗：' + e.message, true);
  }
}

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show${isError ? ' error' : ''}`;
  setTimeout(() => t.className = 'toast', 2800);
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '剛剛';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分鐘前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小時前`;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T00:00:00`;
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});
</script>
